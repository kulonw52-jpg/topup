<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bukti Transfer</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6f8;
}

.header{
    background:#fff;
    padding:18px 20px;
    font-size:22px;
    font-weight:700;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.success{
    text-align:center;
    margin-top:15px;
}

.check{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#22c55e;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
}

.check i{
    color:white;
    font-size:38px;
}

.status{
    margin-top:18px;
    color:#666;
    font-weight:600;
    font-size:17px;
}

.amount{
    margin-top:12px;
    font-size:42px;
    font-weight:700;
}

.card{
    background:#fff;
    margin-top:25px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.row{
    display:flex;
    justify-content:space-between;
    padding:18px 20px;
    border-bottom:1px solid #f1f1f1;
    gap:10px;
}

.row:last-child{
    border-bottom:none;
}

.label{
    color:#777;
    font-size:14px;
}

.value{
    text-align:right;
}

.user-name-row{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
}

.logo{
    width:22px;
    height:22px;
    object-fit:contain;
}

.logo-small{
    width:16px;
    height:16px;
    object-fit:contain;
}

.user-name{
    font-size:16px;
    font-weight:600;
}

.user-info-row{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:5px;
    margin-top:4px;
}

.user-info{
    color:#888;
    font-size:13px;
}

.price{
    font-weight:600;
    word-break:break-all;
}

.old{
    text-decoration:line-through;
    color:#999;
    margin-right:6px;
}

.free{
    color:#22c55e;
}

.copy-box{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
}

.copy-btn{
    border:none;
    background:none;
    cursor:pointer;
    color:#666;
    font-size:18px;
    transition:.2s;
}

.copy-btn:hover{
    transform:scale(1.1);
}

.buttons{
    margin-top:20px;
}

.btn{
    width:100%;
    height:55px;
    border-radius:14px;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

.btn:hover{
    opacity:.9;
}

.btn-share{
    background:white;
    border:2px solid #ff6b00;
    color:#ff6b00;
}

.btn-done{
    margin-top:12px;
    border:none;
    background:#ff6b00;
    color:white;
}

.toast{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-size:14px;
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:999;
}

.toast.show{
    opacity:1;
    visibility:visible;
}

</style>
</head>
<body>

<div class="header">
    Hasil Transfer
</div>

<div class="container">

    <div class="success">

        <div class="check">
            <i class="fas fa-check"></i>
        </div>

        <div class="status">
            Pembayaran Diterima
        </div>

        <div class="amount" id="amount">
            Rp0
        </div>

    </div>

    <div class="card">

        <div class="row">
            <div class="label">Dari</div>

            <div class="value">

                <div class="user-name-row">
                    <img src="pp.png" class="logo">
                    <div class="user-name">
                        kurniawan 
                    </div>
                </div>

                <div class="user-info-row">
                    <img src="seabank.png" class="logo-small">
                    <div class="user-info">
                        901832684887
                    </div>
                </div>

            </div>
        </div>

        <div class="row">
    <div class="label">Ke</div>

    <div class="value">

        <div class="user-name-row">
            <img src="pp.png" class="logo">
            <div class="user-name" id="receiverName">
                -
            </div>
        </div>

        <div class="user-info-row">
            <div class="user-info" id="nomorTujuan">
                5678 9010 1234
            </div>
        </div>

    </div>
</div>

        <div class="row">
            <div class="label">Jumlah Transfer</div>
            <div class="price" id="jumlahTransfer">
              Rp0
            </div>
        </div>

        <div class="row">
            <div class="label">Biaya Transfer</div>
            <div class="price">
                <span class="free">GRATIS</span>
            </div>
        </div>

        <div class="row">
            <div class="label">Jumlah Total</div>
            <div class="price" id="transferAmount">
               Rp0
            </div>
        </div>

        <div class="row">
            <div class="label">No. Transaksi</div>

            <div class="copy-box">

                <span id="trxNumber" class="price">
                    BC2026060412459871
                </span>

                <button
                    class="copy-btn"
                    onclick="copyTransaction()"
                    title="Salin nomor transaksi">

                    <i class="fa-regular fa-copy"></i>

                </button>

            </div>
        </div>

        <div class="row">
            <div class="label">Metode Transfer</div>
            <div class="price">BI-FAST</div>
        </div>

        <div class="row">
            <div class="label">Tanggal</div>
            <div class="price" id="tanggal"></div>
        </div>

        <div class="row">
            <div class="label">Waktu</div>
            <div class="price" id="waktu"></div>
        </div>

    </div>

    <div class="buttons">

        <button class="btn btn-share" onclick="shareReceipt()">
            <i class="fa-solid fa-share-nodes"></i>
            Bagikan
        </button>

        <button class="btn btn-done" onclick="finishTransaction()">
            Selesai
        </button>

    </div>

</div>

<div id="toast" class="toast">
    ✓ Nomor transaksi berhasil disalin
</div>

<script>

// =======================
// AMBIL DATA DARI URL
// =======================
const params = new URLSearchParams(window.location.search);

const nomor = params.get("nomor") || "-";
const nama = params.get("nama") || "-";   // ✅ taruh di sini
const nominal = parseInt(params.get("nominal")) || 0;
const total = parseInt(params.get("total")) || nominal;

// =======================
// TAMPILKAN DATA USER
// =======================
document.getElementById("receiverName").textContent = nama;
document.getElementById("nomorTujuan").textContent = nomor;

// =======================
// WAKTU & TANGGAL
// =======================
const now = new Date();

const tanggal = now.toLocaleDateString("id-ID", {
    day: "2-digit",
    month: "long",
    year: "numeric"
});

const waktu = now.toLocaleTimeString("id-ID", {
    hour: "2-digit",
    minute: "2-digit"
}) + " WIB";

document.getElementById("tanggal").textContent = tanggal;
document.getElementById("waktu").textContent = waktu;

// =======================
// NOMINAL
// =======================
document.getElementById("amount").textContent =
"Rp" + nominal.toLocaleString("id-ID");

document.getElementById("jumlahTransfer").textContent =
"Rp" + nominal.toLocaleString("id-ID");

document.getElementById("transferAmount").textContent =
"Rp" + total.toLocaleString("id-ID");

// =======================
// TRX NUMBER
// =======================
document.getElementById("trxNumber").textContent =
"SB" + Date.now() + Math.floor(Math.random() * 1000);

// =======================
// TOAST
// =======================
function showToast(text){
    const toast = document.getElementById("toast");
    toast.innerText = text;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

// =======================
// COPY
// =======================
function copyTransaction(){
    const trx = document.getElementById("trxNumber").innerText.trim();

    navigator.clipboard.writeText(trx).then(() => {
        showToast("✓ Nomor transaksi berhasil disalin");
    });
}

// =======================
// SHARE
// =======================
function shareReceipt(){
    const trx = document.getElementById("trxNumber").innerText;

    if(navigator.share){
        navigator.share({
            title: "Bukti Transfer",
            text:
                "Transfer berhasil\n" +
                "No Transaksi : " + trx + "\n" +
                "Nominal : Rp" + nominal.toLocaleString("id-ID")
        });
    } else {
        showToast("Browser tidak mendukung fitur bagikan");
    }
}

// =======================
// SELESAI
// =======================
function finishTransaction(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
